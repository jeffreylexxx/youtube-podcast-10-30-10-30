name: Update YouTube podcast dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "site/**"
      - "data/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/update-dashboard.yml"
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and analyze YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MAX_CHANNELS: "28"
          MAX_VIDEOS_PER_CHANNEL: "35"
        run: python scripts/update_data.py --write-history

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data data
          git diff --cached --quiet || git commit -m "Update YouTube podcast dashboard data"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
